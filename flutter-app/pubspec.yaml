name: piper
description: "Decentralized local network messenger"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # shadcn_flutter included per project requirements
  # Components can be integrated once API version is confirmed
  shadcn_flutter: ^0.0.51
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^2.0.1
  # FFI helpers (malloc, Utf8 extension)
  ffi: ^2.1.3
  # State management
  provider: ^6.1.2
  # Persistent user settings (name, avatar)
  shared_preferences: ^2.3.3
  # File picker (send files)
  file_picker: ^10.3.10
  # Platform paths (Downloads folder)
  path_provider: ^2.1.4
  # Open files with native app
  open_file: ^3.3.2
  # WebRTC audio/video calls
  flutter_webrtc: ^1.3.1
  # Runtime permissions (camera, mic)
  permission_handler: ^12.0.1
  # SQLite persistence
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/icon/logo.png"
    icon_size: 48
  linux:
    generate: true
    image_path: "assets/icon/logo.png"
  macos:
    generate: true
    image_path: "assets/icon/logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true
