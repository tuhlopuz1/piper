name: piper
description: "Decentralized local network messenger"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # shadcn_flutter included per project requirements
  # Components can be integrated once API version is confirmed
  shadcn_flutter: ^0.0.51
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0+3
  # FFI helpers (malloc, Utf8 extension)
  ffi: ^2.1.3
  # State management
  provider: ^6.1.2
  # Persistent user settings (name, avatar)
  shared_preferences: ^2.3.3
  # File picker (send files)
  file_picker: ^8.1.4
  # Platform paths (Downloads folder)
  path_provider: ^2.1.4
  # Open files with native app
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
