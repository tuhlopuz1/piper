name: Release Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Run tests
        working-directory: go
        run: go test ./core/ -v -count=1 -timeout 60s -race

  linux:
    name: Linux Release
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Flutter pub get
        working-directory: flutter-app
        run: flutter pub get

      - name: Build Linux release
        working-directory: flutter-app
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release

      - name: Build libpiper.so for Linux bundle
        run: |
          mkdir -p flutter-app/build/linux/x64/release/bundle/lib
          cd go
          CGO_ENABLED=1 go build -buildmode=c-shared \
            -o ../flutter-app/build/linux/x64/release/bundle/lib/libpiper.so \
            ./ffi/

      - name: Package Linux installer (.deb)
        run: |
          mkdir -p dist
          mkdir -p package/deb/DEBIAN package/deb/opt/piper package/deb/usr/bin
          cp -R flutter-app/build/linux/x64/release/bundle/* package/deb/opt/piper/
          cat > package/deb/DEBIAN/control << 'EOF'
          Package: piper
          Version: 1.0.0
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: Piper Team
          Description: Piper desktop client
          EOF
          cat > package/deb/usr/bin/piper << 'EOF'
          #!/usr/bin/env bash
          exec /opt/piper/piper "$@"
          EOF
          chmod +x package/deb/usr/bin/piper
          dpkg-deb --build package/deb dist/piper-linux-amd64.deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: piper-linux
          path: dist/piper-linux-amd64.deb

  macos:
    name: macOS Release
    
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter-app
        run: flutter pub get

      - name: Build macOS release
        working-directory: flutter-app
        run: |
          flutter config --enable-macos-desktop
          flutter build macos --release

      - name: Build libpiper.dylib for app bundle
        run: |
          cd go
          CGO_ENABLED=1 go build -buildmode=c-shared \
            -o ../flutter-app/build/macos/Build/Products/Release/piper.app/Contents/MacOS/libpiper.dylib \
            ./ffi/

      - name: Package macOS installer (.dmg)
        run: |
          mkdir -p dist
          hdiutil create \
            -volname "Piper" \
            -srcfolder flutter-app/build/macos/Build/Products/Release/piper.app \
            -ov -format UDZO \
            dist/piper-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: piper-macos
          path: dist/piper-macos.dmg

  windows:
    name: Windows Release
    
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Install MinGW (for CGO)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter-app
        shell: pwsh
        run: flutter pub get

      - name: Build libpiper.dll
        shell: pwsh
        run: |
          cd go
          $env:CGO_ENABLED = "1"
          go build -buildmode=c-shared -o ..\flutter-app\windows\runner\libpiper.dll .\ffi\

      - name: Build Windows release
        working-directory: flutter-app
        shell: pwsh
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package Windows installer (.exe)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\piper.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: piper-windows
          path: dist/piper-setup.exe

  android:
    name: Android Release
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;27.0.12077973"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter-app
        run: flutter pub get

      - name: Build Android native libraries
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          chmod +x go/build_android.sh
          ./go/build_android.sh

      - name: Build Android release APK
        working-directory: flutter-app
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: piper-android
          path: flutter-app/build/app/outputs/flutter-apk/app-release.apk

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - macos
      - windows
      - android
    if: github.event_name == 'push'
    steps:
      - name: Compute next version
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100
            });

            const semverRegex = /^v(\d+)\.(\d+)\.(\d+)$/;
            const versions = releases
              .map((r) => r.tag_name)
              .map((tag) => {
                const m = tag.match(semverRegex);
                if (!m) return null;
                return {
                  tag,
                  major: Number(m[1]),
                  minor: Number(m[2]),
                  patch: Number(m[3]),
                };
              })
              .filter(Boolean)
              .sort((a, b) => {
                if (a.major !== b.major) return b.major - a.major;
                if (a.minor !== b.minor) return b.minor - a.minor;
                return b.patch - a.patch;
              });

            let major = 0;
            let minor = 0;
            let patch = 0;
            if (versions.length > 0) {
              major = versions[0].major;
              minor = versions[0].minor;
              patch = versions[0].patch;
            }

            const commitTitle = (context.payload.head_commit?.message || "").split("\n")[0].trim();
            if (commitTitle.startsWith("*")) {
              minor += 1;
              patch = 0;
            } else {
              patch += 1;
            }

            const nextTag = `v${major}.${minor}.${patch}`;
            core.info(`Commit title: "${commitTitle}"`);
            core.info(`Next release tag: ${nextTag}`);
            core.setOutput("tag", nextTag);

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact files
        run: |
          mkdir -p release-assets
          find dist -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.apk" \) -exec cp {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/piper-linux-amd64.deb
            release-assets/piper-macos.dmg
            release-assets/piper-setup.exe
            release-assets/app-release.apk
          generate_release_notes: true
